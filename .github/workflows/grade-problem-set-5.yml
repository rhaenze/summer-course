name: "Grade — Problem Set 5"

on:
    push:
        branches:
            - python/problem-set-5
    workflow_dispatch: # allows manual "Run workflow" from the Actions tab

permissions:
    contents: read

jobs:
    # ---------------------------------------------------------------------------
    # One job per problem — run in parallel, each function gets its own step.
    # Steps use continue-on-error so all functions are tested even if one fails.
    # ---------------------------------------------------------------------------
    problem-1:
        name: "Problem 1 — Basic Recursion"
        runs-on: ubuntu-latest
        continue-on-error: true
        env:
            SOLUTION_MODE: ${{ github.repository == 'AFC-AI2C/summer-course' && github.event_name == 'workflow_dispatch' && 'true' || '' }}
        steps:
            - uses: actions/checkout@v6
            - uses: actions/setup-python@v6
              with:
                  python-version: "3.12"
                  cache: "pip"
                  cache-dependency-path: ".github/python_tests/requirements.txt"
            - run: pip install -r .github/python_tests/requirements.txt

            - name: "Recursive Squares"
              run: >
                  pytest .github/python_tests/test_problem_set_5.py::TestRecursiveSquares
                  -v --tb=short --no-header --color=yes -s

    problem-2:
        name: "Problem 2 — Multiple Recursion"
        runs-on: ubuntu-latest
        continue-on-error: true
        env:
            SOLUTION_MODE: ${{ github.repository == 'AFC-AI2C/summer-course' && github.event_name == 'workflow_dispatch' && 'true' || '' }}
        steps:
            - uses: actions/checkout@v6
            - uses: actions/setup-python@v6
              with:
                  python-version: "3.12"
                  cache: "pip"
                  cache-dependency-path: ".github/python_tests/requirements.txt"
            - run: pip install -r .github/python_tests/requirements.txt

            - name: "Recipe class"
              run: >
                  pytest .github/python_tests/test_problem_set_5.py::TestRecipeClass
                  -v --tb=short --no-header --color=yes -s

    problem-3:
        name: "Problem 3 — Basic HTTP Requests"
        runs-on: ubuntu-latest
        continue-on-error: true
        env:
            SOLUTION_MODE: ${{ github.repository == 'AFC-AI2C/summer-course' && github.event_name == 'workflow_dispatch' && 'true' || '' }}
        steps:
            - uses: actions/checkout@v6
            - uses: actions/setup-python@v6
              with:
                  python-version: "3.12"
                  cache: "pip"
                  cache-dependency-path: ".github/python_tests/requirements.txt"
            - run: pip install -r .github/python_tests/requirements.txt

            - name: "LyricAnalyzer class"
              run: >
                  pytest .github/python_tests/test_problem_set_5.py::TestLyricAnalyzerClass
                  -v --tb=short --no-header --color=yes -s

    problem-4:
        name: "Problem 4 — Using a REST API"
        runs-on: ubuntu-latest
        continue-on-error: true
        env:
            SOLUTION_MODE: ${{ github.repository == 'AFC-AI2C/summer-course' && github.event_name == 'workflow_dispatch' && 'true' || '' }}
        steps:
            - uses: actions/checkout@v6
            - uses: actions/setup-python@v6
              with:
                  python-version: "3.12"
                  cache: "pip"
                  cache-dependency-path: ".github/python_tests/requirements.txt"
            - run: pip install -r .github/python_tests/requirements.txt

            - name: "Animal class"
              run: >
                  pytest .github/python_tests/test_problem_set_5.py::TestAnimalClass
                  -v --tb=short --no-header --color=yes -s

    # ---------------------------------------------------------------------------
    # Final gate — runs after all problem jobs, fails the workflow if any test
    # is broken. Uses if: always() so it runs even if a problem job is skipped.
    # ---------------------------------------------------------------------------
    grade:
        name: "Final grade — all tests must pass"
        runs-on: ubuntu-latest
        needs: [problem-1, problem-2, problem-3, problem-4]
        if: always()
        env:
            SOLUTION_MODE: ${{ github.repository == 'AFC-AI2C/summer-course' && github.event_name == 'workflow_dispatch' && 'true' || '' }}
        steps:
            - uses: actions/checkout@v6
            - uses: actions/setup-python@v6
              with:
                  python-version: "3.12"
                  cache: "pip"
                  cache-dependency-path: ".github/python_tests/requirements.txt"
            - run: pip install -r .github/python_tests/requirements.txt

            - name: "Run all tests (no challenge questions)"
              run: >
                  pytest .github/python_tests/test_problem_set_5.py
                  -m "not challenge"
                  --tb=line --no-header --color=yes -q

            - name: "Run all tests (with challenge questions)"
              continue-on-error: true
              run: >
                  pytest .github/python_tests/test_problem_set_5.py
                  --tb=line --no-header --color=yes -q
