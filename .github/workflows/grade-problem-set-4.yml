name: "Grade — Problem Set 4"

on:
    push:
        branches:
            - python/problem-set-4
    workflow_dispatch: # allows manual "Run workflow" from the Actions tab

permissions:
    contents: read

jobs:
    # ---------------------------------------------------------------------------
    # One job per problem — run in parallel, each function gets its own step.
    # Steps use continue-on-error so all functions are tested even if one fails.
    # ---------------------------------------------------------------------------
    problem-1:
        name: "Problem 1 — Soldier Roster & Dispatch System"
        runs-on: ubuntu-latest
        continue-on-error: true
        env:
            SOLUTION_MODE: ${{ github.repository == 'AFC-AI2C/summer-course' && github.event_name == 'workflow_dispatch' && 'true' || '' }}
        steps:
            - uses: actions/checkout@v6
            - uses: actions/setup-python@v6
              with:
                  python-version: "3.12"
                  cache: "pip"
                  cache-dependency-path: ".github/python_tests/requirements.txt"
            - run: pip install -r .github/python_tests/requirements.txt

            - name: "Soldier class"
              run: >
                  pytest .github/python_tests/test_problem_set_4.py::TestSoldierClass
                  -v --tb=short --no-header --color=yes -s

            - name: "process_reports()"
              run: >
                  pytest .github/python_tests/test_problem_set_4.py::TestProcessReports
                  -v --tb=short --no-header --color=yes -s

            - name: "show_available()"
              run: >
                  pytest .github/python_tests/test_problem_set_4.py::TestShowAvailable
                  -v --tb=short --no-header --color=yes -s

            - name: "dispatch()"
              run: >
                  pytest .github/python_tests/test_problem_set_4.py::TestDispatch
                  -v --tb=short --no-header --color=yes -s

            - name: "fitness_report() — Challenge"
              run: >
                  pytest .github/python_tests/test_problem_set_4.py::TestFitnessReport
                  -v --tb=short --no-header --color=yes -s

    problem-2:
        name: "Problem 2 — Recipe Ingredient Checker"
        runs-on: ubuntu-latest
        continue-on-error: true
        env:
            SOLUTION_MODE: ${{ github.repository == 'AFC-AI2C/summer-course' && github.event_name == 'workflow_dispatch' && 'true' || '' }}
        steps:
            - uses: actions/checkout@v6
            - uses: actions/setup-python@v6
              with:
                  python-version: "3.12"
                  cache: "pip"
                  cache-dependency-path: ".github/python_tests/requirements.txt"
            - run: pip install -r .github/python_tests/requirements.txt

            - name: "Recipe class"
              run: >
                  pytest .github/python_tests/test_problem_set_4.py::TestRecipeClass
                  -v --tb=short --no-header --color=yes -s

            - name: "Pantry class"
              run: >
                  pytest .github/python_tests/test_problem_set_4.py::TestPantryClass
                  -v --tb=short --no-header --color=yes -s

            - name: "create_recipes()"
              run: >
                  pytest .github/python_tests/test_problem_set_4.py::TestCreateRecipes
                  -v --tb=short --no-header --color=yes -s

            - name: "check_recipes()"
              run: >
                  pytest .github/python_tests/test_problem_set_4.py::TestCheckRecipes
                  -v --tb=short --no-header --color=yes -s

            - name: "Pantry.add_ingredients() — Challenge"
              run: >
                  pytest .github/python_tests/test_problem_set_4.py::TestPantryAddIngredients
                  -v --tb=short --no-header --color=yes -s

    problem-3:
        name: "Problem 3 — Song Lyric Word Counter"
        runs-on: ubuntu-latest
        continue-on-error: true
        env:
            SOLUTION_MODE: ${{ github.repository == 'AFC-AI2C/summer-course' && github.event_name == 'workflow_dispatch' && 'true' || '' }}
        steps:
            - uses: actions/checkout@v6
            - uses: actions/setup-python@v6
              with:
                  python-version: "3.12"
                  cache: "pip"
                  cache-dependency-path: ".github/python_tests/requirements.txt"
            - run: pip install -r .github/python_tests/requirements.txt

            - name: "LyricAnalyzer class"
              run: >
                  pytest .github/python_tests/test_problem_set_4.py::TestLyricAnalyzerClass
                  -v --tb=short --no-header --color=yes -s

            - name: "LyricAnalyzer.filter_stopwords() — Challenge"
              run: >
                  pytest .github/python_tests/test_problem_set_4.py::TestFilterStopwords
                  -v --tb=short --no-header --color=yes -s

    problem-4:
        name: "Problem 4 — Zoo Animal Registry"
        runs-on: ubuntu-latest
        continue-on-error: true
        env:
            SOLUTION_MODE: ${{ github.repository == 'AFC-AI2C/summer-course' && github.event_name == 'workflow_dispatch' && 'true' || '' }}
        steps:
            - uses: actions/checkout@v6
            - uses: actions/setup-python@v6
              with:
                  python-version: "3.12"
                  cache: "pip"
                  cache-dependency-path: ".github/python_tests/requirements.txt"
            - run: pip install -r .github/python_tests/requirements.txt

            - name: "Animal class"
              run: >
                  pytest .github/python_tests/test_problem_set_4.py::TestAnimalClass
                  -v --tb=short --no-header --color=yes -s

            - name: "build_registry()"
              run: >
                  pytest .github/python_tests/test_problem_set_4.py::TestBuildRegistry
                  -v --tb=short --no-header --color=yes -s

            - name: "analyze_registry()"
              run: >
                  pytest .github/python_tests/test_problem_set_4.py::TestAnalyzeRegistry
                  -v --tb=short --no-header --color=yes -s

            - name: "group_by_species() — Challenge"
              run: >
                  pytest .github/python_tests/test_problem_set_4.py::TestGroupBySpecies
                  -v --tb=short --no-header --color=yes -s

    # ---------------------------------------------------------------------------
    # Final gate — runs after all problem jobs, fails the workflow if any test
    # is broken. Uses if: always() so it runs even if a problem job is skipped.
    # ---------------------------------------------------------------------------
    grade:
        name: "Final grade — all tests must pass"
        runs-on: ubuntu-latest
        needs: [problem-1, problem-2, problem-3, problem-4]
        if: always()
        env:
            SOLUTION_MODE: ${{ github.repository == 'AFC-AI2C/summer-course' && github.event_name == 'workflow_dispatch' && 'true' || '' }}
        steps:
            - uses: actions/checkout@v6
            - uses: actions/setup-python@v6
              with:
                  python-version: "3.12"
                  cache: "pip"
                  cache-dependency-path: ".github/python_tests/requirements.txt"
            - run: pip install -r .github/python_tests/requirements.txt

            - name: "Run all tests (no challenge questions)"
              run: >
                  pytest .github/python_tests/test_problem_set_4.py
                  -m "not challenge"
                  --tb=line --no-header --color=yes -q

            - name: "Run all tests (with challenge questions)"
              continue-on-error: true
              run: >
                  pytest .github/python_tests/test_problem_set_4.py
                  --tb=line --no-header --color=yes -q
